name: Deploy Render

on:
  workflow_run:
    workflows:
      - Angular CI
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy frontend to Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"

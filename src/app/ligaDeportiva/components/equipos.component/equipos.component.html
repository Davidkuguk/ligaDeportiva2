<!-- Comentario de estudiante: esta plantilla pinta la parte visual del componente y sus datos principales. -->
<main class="container py-4">
  <div class="d-flex align-items-end justify-content-between flex-wrap gap-3 mb-4">
    <div>
      <p class="section-kicker mb-1">Plantillas</p>
      <h1 class="h2 mb-0">Equipos</h1>
    </div>
    <p class="mb-0 text-white-50">Componentes separados con datos locales del navegador.</p>
  </div>

  <div class="row g-4">
    @for (team of teams; track team.name) {
      <section class="col-12 col-lg-4">
        <article class="card card-surface h-100 border-0 shadow-sm overflow-hidden">
          <img [src]="team.image" [alt]="team.name" class="team-image">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
              <div>
                <h2 class="h3 text-dark mb-1">{{ team.name }}</h2>
                <p class="text-body-secondary mb-0">{{ team.competition }}</p>
              </div>
              <span class="badge text-bg-warning">Capitan</span>
            </div>
            <p class="mb-3"><strong>{{ team.captain }}</strong></p>
            <h3 class="h6 text-uppercase text-muted">Plantilla</h3>
            <ul class="list-group list-group-flush">
              @for (player of team.players; track player) {
                <li class="list-group-item px-0 bg-transparent">{{ player }}</li>
              }
            </ul>
          </div>
        </article>
      </section>
    }
  </div>
</main>

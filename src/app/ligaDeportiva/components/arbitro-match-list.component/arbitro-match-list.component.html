<!-- esta plantilla pinta la parte visual del componente y sus datos principales. -->
<section class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h2 class="h4 colorMorado mb-3">Partidos a arbitrar</h2>
    <div class="d-flex flex-column gap-3" *ngIf="matches.length; else emptyState">
      <!-- uso article para mostrar una tarjeta o elemento independiente. -->
      <article class="border rounded p-3" *ngFor="let match of matches">
        <strong>{{ match.localTeam }} vs {{ match.awayTeam }}</strong>
        <div class="small text-secondary">{{ match.date }} Â· {{ match.venue || 'Sin sede' }}</div>
        <div class="small text-secondary">{{ match.competition }} Â· {{ match.round }} Â· {{ match.status }}</div>
        <div class="small text-secondary">Resultado: {{ match.score || 'Pendiente' }}</div>
      </article>
    </div>
    <ng-template #emptyState>
      <p class="mb-0 text-secondary">No tienes partidos asignados.</p>
    </ng-template>
  </div>
</section>

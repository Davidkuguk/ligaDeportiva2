<!-- esta plantilla pinta la parte visual del componente y sus datos principales. -->
<section class="card shadow-sm border-0">
  <div class="card-body p-4">
    <p class="section-kicker mb-1">Usuario</p>
    <h2 class="h4 colorMorado mb-2">Partidos de tu equipo</h2>
    <p class="mb-1 text-secondary">Bienvenido, <strong>{{ firstName }}</strong>.</p>
    <p class="mb-1 text-secondary">Equipo asociado: <strong>{{ teamName || 'Sin equipo' }}</strong>.</p>
    <p class="mb-0 text-secondary">Partidos visibles: <strong>{{ totalMatches }}</strong>.</p>
  </div>
</section>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <section class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h2 mb-4 colorMorado">Login</h1>
                    <form class="d-flex flex-column gap-3" [formGroup]="loginForm" (ngSubmit)="submit()">
                        <div>
                            <label for="username" class="form-label colorMorado">Usuario</label>
                            <input id="username" type="text" class="form-control" placeholder="Introduce tu usuario"
                                formControlName="username">
                        </div>
                        <div>
                            <label for="password" class="form-label colorMorado">Contrasena</label>
                            <input id="password" type="password" class="form-control" placeholder="Introduce tu clave"
                                formControlName="password">
                        </div>
                        <p class="mb-0 text-secondary">
                            El acceso redirige al panel correspondiente segun el tipo guardado en MongoDB.
                        </p>
                        <div *ngIf="submitError" class="alert alert-danger mb-0" role="alert">{{ submitError }}</div>
                        <button type="submit" class="btn fondoMorado text-white registro-submit-btn"
                            [disabled]="isSubmitting" [attr.aria-busy]="isSubmitting">
                            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                            <span>{{ isSubmitting ? 'Entrando...' : 'Entrar' }}</span>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </div>
</main>

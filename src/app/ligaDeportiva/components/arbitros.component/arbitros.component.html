<!-- esta plantilla pinta la parte visual del componente y sus datos principales. -->
<main class="container py-4">
  <div class="mb-4">
    <p class="section-kicker mb-1">Arbitraje</p>
    <h1 class="h2 mb-0">Arbitros</h1>
  </div>

  <div class="row g-4">
    @for (referee of referees; track referee.name) {
      <!-- separo esta seccion para organizar mejor la vista. -->
      <section class="col-12 col-lg-6">
        <!-- uso article para mostrar una tarjeta o elemento independiente. -->
        <article class="card card-surface h-100 border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
              <div>
                <h2 class="h3 text-dark mb-1">{{ referee.name }}</h2>
                <p class="text-body-secondary mb-0">{{ referee.competition }}</p>
              </div>
              <span class="badge text-bg-secondary">{{ referee.category }}</span>
            </div>
            <p class="mb-1"><strong>Apodo:</strong> {{ referee.nickname }}</p>
            <p class="mb-3"><strong>Pais:</strong> {{ referee.country }}</p>
            <h3 class="h6 text-uppercase text-muted">Datos</h3>
            <ul class="list-group list-group-flush">
              @for (stat of referee.stats; track stat) {
                <li class="list-group-item px-0 bg-transparent">{{ stat }}</li>
              }
            </ul>
          </div>
        </article>
      </section>
    }
  </div>
</main>

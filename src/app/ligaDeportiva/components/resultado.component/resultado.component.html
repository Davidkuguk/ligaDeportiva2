<!-- Comentario de estudiante: esta plantilla pinta la parte visual del componente y sus datos principales. -->
<main class="container py-4">
  <div class="mb-4">
    <p class="section-kicker mb-1">Seguimiento</p>
    <h1 class="h2 mb-0">Resultados</h1>
  </div>

  <div class="table-responsive rounded-4 overflow-hidden shadow-sm">
    <table class="table table-light table-striped align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th scope="col">Local</th>
          <th scope="col">Marcador</th>
          <th scope="col">Visitante</th>
          <th scope="col">Competicion</th>
          <th scope="col">Jornada</th>
          <th scope="col">Fecha</th>
        </tr>
      </thead>
      <tbody>
        @for (result of results; track result.localTeam + result.awayTeam) {
          <tr>
            <td>{{ result.localTeam }}</td>
            <td class="fw-bold">{{ result.score }}</td>
            <td>{{ result.awayTeam }}</td>
            <td>{{ result.competition }}</td>
            <td>{{ result.round }}</td>
            <td>{{ result.date }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</main>

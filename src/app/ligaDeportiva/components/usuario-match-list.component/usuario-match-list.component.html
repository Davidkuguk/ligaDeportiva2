<section class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h2 class="h4 colorMorado mb-3">Calendario del equipo</h2>
    <div class="d-flex flex-column gap-3" *ngIf="matches.length; else emptyState">
      <article class="border rounded p-3" *ngFor="let match of matches">
        <strong>{{ match.localTeam }} vs {{ match.awayTeam }}</strong>
        <div class="small text-secondary">{{ match.date }} · {{ match.competition }} · {{ match.round }}</div>
        <div class="small text-secondary">Arbitro: {{ match.refereeName || 'Sin asignar' }}</div>
        <div class="small text-secondary">Resultado: {{ match.score || 'Pendiente' }}</div>
      </article>
    </div>
    <ng-template #emptyState>
      <p class="mb-0 text-secondary" *ngIf="teamName; else noTeam">No hay partidos para tu equipo.</p>
    </ng-template>
    <ng-template #noTeam>
      <p class="mb-0 text-secondary">Tu usuario no tiene equipo asociado.</p>
    </ng-template>
  </div>
</section>
